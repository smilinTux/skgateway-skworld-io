<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif}
.og{width:1200px;height:630px;position:relative;background:radial-gradient(ellipse at 30% 20%,#0d1b2a 0%,#1b2838 45%,#0a0a0a 100%);display:flex;flex-direction:column;justify-content:center;padding:0 90px;color:#fff}
.icon{font-size:130px;line-height:1;margin-bottom:18px;filter:drop-shadow(0 0 50px rgba(33,150,243,0.7))}
h1{font-size:118px;font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(120deg,#2196F3,#00BCD4 50%,#4CAF50 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.sub{font-size:40px;font-weight:600;color:rgba(255,255,255,0.82);margin-bottom:26px}
.tag{font-size:30px;font-style:italic;color:#00BCD4;border-left:5px solid rgba(0,188,212,0.5);padding-left:22px;line-height:1.35;max-width:900px}
.foot{position:absolute;bottom:46px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:center}
.url{font-family:'JetBrains Mono',monospace;font-size:26px;color:#00BCD4}
.brand{font-family:'JetBrains Mono',monospace;font-size:24px;color:#ffd700}
</style></head><body><div class="og">
<div class="icon">🛡️</div><h1>SKGateway</h1><div class="sub">Enterprise AI Inference Proxy</div>
<div class="tag">"BlueCoat for AI — routes, monitors, audits and secures all AI inference traffic"</div>
<div class="foot"><span class="url">skgateway.skworld.io</span><span class="brand">🐧 SKWorld</span></div>
</div></body></html>
